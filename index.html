<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Anthropic Arcana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
html,body{
  width:100%;height:100%;
  overflow:hidden;background:#0e0e0d;
  font-family:'Noto Serif SC',serif;
  position:fixed;
  overscroll-behavior:none;
}
:root{
  --or:#d97757;--bl:#6a9bcc;--gr:#788c5d;
  --dk:#141413;--lt:#faf9f5;--md:#b0aea5;--dim:#5a5854;
}


#app{
  display:flex;flex-direction:column;
  width:100vw;height:100vh;
  /* iPhone safe areas */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  background:#141413;
  overflow:hidden;
}

/* ── HEADER ── */
#hdr{
  flex:0 0 auto;
  padding:14px 28px 11px;
  border-bottom:1px solid rgba(217,119,87,.2);
  display:flex;align-items:center;justify-content:space-between;
}
#hdr h1{
  font-family:'Noto Serif SC',serif;font-size:18px;font-weight:500;
  letter-spacing:.22em;color:var(--or);
}
#hdr .sub{
  font-family:'Noto Serif SC',serif;font-style:italic;
  font-size:15px;color:var(--md);margin-left:14px;
}
#hdr .badge{
  font-family:'Noto Serif SC',serif;font-size:15px;
  letter-spacing:.12em;color:var(--dim);
}

/* ── TABS ── */
#tabs{
  flex:0 0 auto;
  display:flex;gap:6px;padding:9px 28px;
  border-bottom:1px solid rgba(217,119,87,.12);
  flex-wrap:wrap;
  -webkit-overflow-scrolling:touch;
}
.tb{
  font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:.09em;
  color:var(--md);background:transparent;
  border:1px solid rgba(176,174,165,.22);
  padding:6px 14px;border-radius:4px;cursor:pointer;
  white-space:nowrap;transition:all .18s;
  touch-action:manipulation;
  min-height:44px;
}
.tb:hover{color:#fff;border-color:rgba(217,119,87,.45)}
.tb.on{color:var(--or);border-color:var(--or);background:rgba(217,119,87,.07)}

/* ── STAGE: fills remaining space ── */
#stage{
  flex:1 1 0;  /* grow to fill, allow shrink, base 0 */
  position:relative;
  overflow:hidden;
  min-height:0; /* crucial: lets flexbox shrink below content size */
}
#canvas{position:absolute;inset:0}

#empty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;pointer-events:none;
}
#empty .ic{font-size:36px;color:var(--or);opacity:.25}
#empty p{
  font-family:'Noto Serif SC',serif;font-size:15px;
  color:var(--dim);letter-spacing:.16em;
}

/* ── CARD SLOTS ── */
.slot{
  position:absolute;transform-origin:center center;
  cursor:default;
  opacity:0;transition:opacity .32s ease;
  z-index:1;
}
.slot.in{opacity:1}
.slot.click{cursor:pointer}
.slot.next-flip{cursor:pointer}
.slot.next-flip .back{
  border-radius:9px;
  animation:pulse-glow 1.4s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 0 2px rgba(217,119,87,.85), 0 0 16px 4px rgba(217,119,87,.28)}
  50%    {box-shadow:0 0 0 2px rgba(217,119,87,1),   0 0 28px 9px rgba(217,119,87,.48)}
}
.inner{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .62s cubic-bezier(.23,1,.32,1);
}
.slot.flipped .inner{transform:rotateY(180deg)}
.slot.zoomed .lbl{opacity:0}
.face,.back{
  position:absolute;inset:0;
  backface-visibility:hidden;border-radius:9px;overflow:hidden;
}
.face{transform:rotateY(180deg)}
.lbl{
  position:absolute;bottom:-21px;left:50%;transform:translateX(-50%);
  font-family:'Noto Serif SC',serif;font-size:15px;color:var(--dim);
  letter-spacing:.07em;white-space:nowrap;
  transition:opacity .2s;
}


/* ── CARD PREVIEW OVERLAY (hover) ── */
#card-preview{
  position:fixed;
  pointer-events:none;
  z-index:999;
  opacity:0;
  transition:opacity .18s ease;
  filter:drop-shadow(0 12px 40px rgba(0,0,0,.85));
}
#card-preview.show{opacity:1}
#card-preview svg{display:block;border-radius:12px}

/* on touch devices the preview is centred and dismissable */
@media (hover:none){
  #card-preview{
    pointer-events:auto;
    left:50% !important;
    top:50% !important;
    transform:translate(-50%,-50%) !important;
  }
  #card-preview.show::after{
    content:'';position:fixed;inset:0;z-index:-1;
    background:rgba(0,0,0,.55);
  }
}

/* ── MOBILE RESPONSIVE ── */
@media (max-width:600px){
  #hdr{padding:8px 14px 6px}
  #hdr h1{font-size:14px;letter-spacing:.1em}
  #hdr .sub{display:none}
  #hdr .badge{display:none}

  #tabs{
    padding:6px 10px;gap:5px;
    /* horizontal scroll instead of wrap on small screens */
    flex-wrap:nowrap;overflow-x:auto;
    scrollbar-width:none;
  }
  #tabs::-webkit-scrollbar{display:none}
  .tb{font-size:12px;padding:6px 10px;flex-shrink:0}

  #bot{padding:8px 14px 10px;gap:8px}
  .info .desc{font-size:13px}
  .info .cnt{font-size:12px}
  .btn-p{font-size:13px;padding:9px 9px}
  .btn-s{font-size:13px;padding:8px 8px}

  .lbl{font-size:9px;bottom:-16px}

  #ph{padding:10px 14px}
  #ph h2{font-size:14px}
  #pb{padding:12px 14px;gap:10px}
  .rc{padding:10px}
  .rcn{font-size:14px}
  .rcm{font-size:13px}
}

/* ── BOTTOM BAR ── */
#bot{
  flex:0 0 auto;
  border-top:1px solid rgba(217,119,87,.12);
  padding:10px 28px 14px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.info .desc{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--md);font-style:italic}
.info .cnt{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--dim);letter-spacing:.1em;margin-top:3px}
.info{flex:1;min-width:140px}

.btn-p{
  font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:.15em;
  color:#141413;background:var(--or);
  border:none;padding:10px 10px;border-radius:4px;
  cursor:pointer;white-space:nowrap;transition:background .18s,transform .12s;
  touch-action:manipulation;
  min-height:44px;
}
.btn-p:hover{background:#e8876a;transform:translateY(-1px)}
.btn-p:active{transform:none}
.btn-s{
  font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:.1em;
  background:transparent;border:1px solid rgba(176,174,165,.28);
  padding:9px 9px;border-radius:4px;cursor:pointer;
  white-space:nowrap;transition:all .18s;
  touch-action:manipulation;
  min-height:44px;
}
#rbtn{color:var(--gr);border-color:rgba(120,140,93,.38)}
#rbtn:hover{border-color:var(--gr);color:#a0bb7d}
#xbtn{color:var(--md)}
#xbtn:hover{color:#fff}

/* ── READING PANEL (overlay inside stage) ── */
#panel{
  display:none;position:absolute;inset:0;
  background:rgba(20,20,19,.97);z-index:50;
  flex-direction:column;overflow:hidden;
}
#panel.open{display:flex}
#ph{
  flex:0 0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;border-bottom:1px solid rgba(217,119,87,.25);
}
#ph h2{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:500;color:var(--or);letter-spacing:.16em}
#clo{
  font-family:'Noto Serif SC',serif;font-size:15px;color:var(--md);
  background:transparent;border:1px solid rgba(176,174,165,.25);
  padding:6px 14px;border-radius:4px;cursor:pointer;letter-spacing:.1em;
  transition:all .18s;
}
#clo:hover{color:#fff;border-color:var(--md)}
#pb{flex:1 1 0;overflow-y:auto;padding:16px 22px;display:flex;flex-direction:column;gap:12px;min-height:0;
  -webkit-overflow-scrolling:touch;
}

/* scrollbar */
#pb::-webkit-scrollbar{width:4px}
#pb::-webkit-scrollbar-track{background:transparent}
#pb::-webkit-scrollbar-thumb{background:rgba(217,119,87,.3);border-radius:2px}

.rc{
  display:flex;gap:14px;align-items:flex-start;
  padding:14px;border:1px solid rgba(217,119,87,.14);
  border-radius:7px;background:rgba(217,119,87,.03);
  transition:border-color .2s;
}
.rc.hi{border-color:rgba(217,119,87,.55);background:rgba(217,119,87,.06)}
.rct{flex-shrink:0}
.rcp{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--or);letter-spacing:.15em;margin-bottom:4px;text-transform:uppercase}
.rcn{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--lt);font-weight:500;margin-bottom:5px}
.rcr{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--md);font-style:italic;margin-bottom:4px}
.rcm{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--md);line-height:1.65}

/* ── STAR BACKGROUND ── */
#stars{position:absolute;inset:0;pointer-events:none;z-index:0}
</style>
</head>
<body>

    </div>
    <button class="btn-p" id="dbtn">✦ 抽牌</button>
    <button class="btn-p" id="fnbtn" style="display:none">翻开下一张 ✦</button>
    <button class="btn-s" id="rbtn">解读 ✦</button>
    <button class="btn-s" id="xbtn">重置</button>
  </div>

</div>
<div id="card-preview"></div>
<script>
/* ── STARS ── */
(function(){
  const c=document.getElementById('stars');
  const st=document.getElementById('stage');
  function draw(){
    const dpr = window.devicePixelRatio || 1;
    const W = st.clientWidth, H = st.clientHeight;
    c.width  = W * dpr;
    c.height = H * dpr;
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    const ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
    for(let i=0;i<120;i++){
      const x=Math.random()*W, y=Math.random()*H;
      const r=Math.random()*.9+.15;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(250,249,245,${Math.random()*.18+.04})`;
      ctx.fill();
    }
  }
  draw();
  new ResizeObserver(draw).observe(st);
})();

/* ── DATA ── */

  {id:1,num:'I',name:'魔法师',eng:'The Magician',m:'意志力，技能，专注，行动力。你拥有实现梦想所需的一切工具，是时候施展你的魔法了。',r:'操控，计划不周，未发挥的才能。能力在那里，但方向或动机需要重新审视。'},

  {id:4,num:'IV',name:'皇帝',eng:'The Emperor',m:'权威，秩序，结构，稳定，父性力量。建立稳固的基础是成功的前提。',r:'独裁，过度控制，缺乏灵活。坚硬的结构可能成为囚笼。'},

  {id:19,num:'XIX',name:'太阳',eng:'The Sun',m:'积极，喜悦，活力，成功，温暖光芒。此刻的你正绽放如太阳，一切皆有可能。',r:'内心阴影遮蔽，暂时的消沉，过于乐观。即使在阴天，太阳也没有消失。'},

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

// ── Image filename mapping ──
function cardFilename(card){
  if(card === 'back') return 'tarot_cards/back.png';
  const suitMap = {wands:'wa', cups:'cu', swords:'sw', pentacles:'pe'};
  if(card.type === 'major'){
    return `tarot_cards/ar${String(card.id).padStart(2,'0')}.png`;
  } else {
    const prefix = suitMap[card.suit];
    const n = RANKS.indexOf(card.rank) + 1;
    return `tarot_cards/${prefix}${String(n).padStart(2,'0')}.png`;
  }
}

// ── Card renderers (PNG image) ──
function backSVG(w,h){
  return `<img src="tarot_cards/back.png" style="width:${w}px;height:${h}px;display:block;border-radius:8px;object-fit:cover">`;
}

function faceSVG(card,w,h){
  const src = cardFilename(card);
  const rotate = card._rv ? 'transform:rotate(180deg);' : '';
  return `<img src="${src}" style="width:${w}px;height:${h}px;display:block;border-radius:8px;object-fit:cover;${rotate}">`;
}

// ── Layout engine ──
function cardSizeForSpread(stW, stH, positions){
  const xs=positions.map(p=>p.x), ys=positions.map(p=>p.y);
  const spanX=(Math.max(...xs)-Math.min(...xs))||0;
  const spanY=(Math.max(...ys)-Math.min(...ys))||0;
  const margin=0.88;
  // available area per card slot
  const byW = stW*margin / (spanX + 1.6);
  const byH = stH*margin / (spanY + 1.6);
  // card ratio h/w = 1.75
  const fromW = byW;
  const fromH = byH / 1.75;
  const w = Math.floor(Math.min(fromW, fromH, 130));
  const h = Math.floor(w * 1.75);
  return { w: Math.max(w, 52), h: Math.max(h, 91) };
}

function refreshZIndex(){
  const canvas = document.getElementById('canvas');
  if(!canvas) return;
  canvas.querySelectorAll('.slot').forEach((sl,i)=>{
    if(sl.classList.contains('flipped')){
      sl.style.zIndex = 2;
    } else if(i === flippedCount){
      sl.style.zIndex = 10;
    } else {
      sl.style.zIndex = 1;
    }
  });
}

function render(){
  const canvas = document.getElementById('canvas');
  const empty  = document.getElementById('empty');
  canvas.innerHTML = '';
  document.getElementById('card-preview').classList.remove('show');
  if(!drawn.length){
    empty.style.display='flex';
    document.getElementById('dbtn').style.display = '';
    document.getElementById('fnbtn').style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  // restore button state on resize
  document.getElementById('dbtn').style.display = 'none';
  document.getElementById('fnbtn').style.display = '';

  const sp   = SPREADS[curSp];
  const stW  = canvas.offsetWidth;
  const stH  = canvas.offsetHeight;
  let {w,h} = cardSizeForSpread(stW, stH, sp.pos);
  // single and three spreads: double the card size
  if(curSp === 'single' || curSp === 'three'){
    const maxW = Math.floor(stW * 0.88 / (sp.pos.length === 1 ? 1 : 3));
    const maxH = Math.floor(stH * 0.82);
    const maxByRatio = Math.floor(maxH / 1.75);
    const doubled = Math.min(w * 2, maxW, maxByRatio, 260);
    w = doubled;
    h = Math.floor(w * 1.75);
  }

  const xs   = sp.pos.map(p=>p.x), ys = sp.pos.map(p=>p.y);
  const midX = (Math.min(...xs)+Math.max(...xs))/2;
  const midY = (Math.min(...ys)+Math.max(...ys))/2;
  const cx   = stW/2, cy = stH/2;
  const stepX = w  * 1.2;
  const stepY = h  * 1.18;

  let nextFlip = flippedCount; // restore after resize

  sp.pos.forEach((p,i)=>{
    const slot = document.createElement('div');
    slot.className = 'slot' + (drawn[i] && drawn[i]._rv ? ' rv' : '');
    const left = cx + (p.x - midX)*stepX - w/2;
    const top  = cy + (p.y - midY)*stepY - h/2;
    slot.style.cssText = `left:${left}px;top:${top}px;width:${w}px;height:${h}px;${p.r?`transform:rotate(${p.r}deg)`:''}`;

    const inner = document.createElement('div'); inner.className='inner';
    const back  = document.createElement('div'); back.className='back';  back.innerHTML=backSVG(w,h);
    const face  = document.createElement('div'); face.className='face';
    if(drawn[i]) face.innerHTML = faceSVG(drawn[i], w, h);
    inner.append(back, face);

    const lbl = document.createElement('div'); lbl.className='lbl'; lbl.textContent=p.l;
    slot.append(inner, lbl);
    slot.dataset.i = i;

    // ── Preview: mouse hover on desktop, tap-to-preview on touch ──
    const isTouchDevice = () => window.matchMedia('(hover:none)').matches;

    function showPreview(card, clientX, clientY){
      const preview = document.getElementById('card-preview');
      const PW = 320, PH = 560;
      preview.innerHTML = faceSVG(card, PW, PH);
      if(!isTouchDevice()){
        preview.style.transform = '';
        const margin = 16;
        let px = clientX + margin;
        let py = clientY - PH / 2;
        if(px + PW > window.innerWidth - margin) px = clientX - PW - margin;
        py = Math.max(margin, Math.min(py, window.innerHeight - PH - margin));
        preview.style.left = px + 'px';
        preview.style.top  = py + 'px';
      } else {
        preview.style.transform = '';
        preview.style.left = '';
        preview.style.top  = '';
      }
      preview.classList.add('show');
    }

    // Desktop: mouseenter/move/leave
    slot.addEventListener('mouseenter', e => {
      if(isTouchDevice()) return;
      if(!slot.classList.contains('flipped')) return;
      const card = drawn[+slot.dataset.i];
      if(card) showPreview(card, e.clientX, e.clientY);
    });
    slot.addEventListener('mousemove', e => {
      if(isTouchDevice()) return;
      const preview = document.getElementById('card-preview');
      if(!preview.classList.contains('show')) return;
      const PW=160, PH=280, margin=16;
      let px = e.clientX + margin;
      let py = e.clientY - PH / 2;
      if(px + PW > window.innerWidth - margin) px = e.clientX - PW - margin;
      py = Math.max(margin, Math.min(py, window.innerHeight - PH - margin));
      preview.style.left = px + 'px';
      preview.style.top  = py + 'px';
    });
    slot.addEventListener('mouseleave', () => {
      if(isTouchDevice()) return;
      document.getElementById('card-preview').classList.remove('show');
    });

    canvas.appendChild(slot);

    // staggered deal animation — face down, but restore already-flipped cards
    requestAnimationFrame(()=>{
      setTimeout(()=>{
        slot.classList.add('in');
        // restore previously flipped state
        if(i < flippedCount){
          slot.classList.add('flipped','click');
        }
        // after all cards dealt, highlight the next one (if any remain)
        if(i === sp.pos.length-1){
          if(flippedCount >= sp.pos.length){
          } else {
            setTimeout(()=>{ highlightNext(); refreshZIndex(); }, 200);
          }
        }
      }, i*130 + 30);
    });
  });

  function highlightNext(){
    canvas.querySelectorAll('.slot').forEach(s=>s.classList.remove('next-flip'));
    if(nextFlip < sp.pos.length){
      canvas.querySelectorAll('.slot')[nextFlip].classList.add('next-flip');
    }
  }

  function updateFlipBtn(){
    const fnbtn = document.getElementById('fnbtn');
    const remaining = sp.pos.length - nextFlip;
    if(remaining > 0){
      fnbtn.style.display = '';
      fnbtn.textContent = `翻开下一张 ✦`;
      document.getElementById('desc').textContent =
        `剩余 ${remaining} 张待翻开`;
    } else {
      // all flipped — repurpose button as redraw
      fnbtn.textContent = '✦ 重新抽牌';
      document.getElementById('desc').textContent = SPREADS[curSp].desc;
    }
  }

  // wire up the flip-next / redraw button (unbind previous listener first)
  const fnbtn = document.getElementById('fnbtn');
  const newFnbtn = fnbtn.cloneNode(true); // remove old listeners
  fnbtn.parentNode.replaceChild(newFnbtn, fnbtn);
  newFnbtn.style.display = '';

  newFnbtn.addEventListener('click', ()=>{
    if(nextFlip < sp.pos.length){
      // close reading panel if open
      document.getElementById('panel').classList.remove('open');
      const slots = canvas.querySelectorAll('.slot');
      const s = slots[nextFlip];
      if(!s) return;
      s.classList.remove('next-flip');
      s.classList.add('flipped','click');
      nextFlip++;
      flippedCount = nextFlip;
      refreshZIndex();
      if(nextFlip < sp.pos.length) highlightNext();
      updateFlipBtn();
    } else {
      document.getElementById('dbtn').click();
    }
  });

  updateFlipBtn();
  highlightNext();
  refreshZIndex();

  // canvas tap: only for preview (touch) or open reading panel (desktop/touch)
  let lastTappedIdx = -1;

  function handleCanvasTap(target){
    const preview = document.getElementById('card-preview');
    const isTouchDev = window.matchMedia('(hover:none)').matches;

    const onPreview = target && typeof target.closest === 'function'
      && target.closest('#card-preview');
    if(onPreview){
      preview.classList.remove('show');
      lastTappedIdx = -1;
      return;
    }

    const s = (target && typeof target.closest === 'function')
      ? target.closest('.slot[data-i]')
      : null;

    if(!s){
      if(isTouchDev){ preview.classList.remove('show'); lastTappedIdx = -1; }
      return;
    }

    if(!s.classList.contains('flipped')) return; // unflipped cards no longer tappable

    const idx = +s.dataset.i;

    if(isTouchDev){
      if(lastTappedIdx === idx){
        preview.classList.remove('show');
        lastTappedIdx = -1;
        openPanel(idx);
      } else {
        const card = drawn[idx];
        if(card) showPreview(card, 0, 0);
        lastTappedIdx = idx;
      }
    } else {
      preview.classList.remove('show');
      openPanel(idx);
    }
  }

  canvas.addEventListener('click', e => handleCanvasTap(e.target));

  let touchTargetEl = null;
  canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    let el = document.elementFromPoint(t.clientX, t.clientY);
    while(el && el !== canvas && typeof el.closest !== 'function') el = el.parentNode;
    touchTargetEl = el || null;
  }, {passive: true});
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if(touchTargetEl){ handleCanvasTap(touchTargetEl); touchTargetEl = null; }
  }, {passive: false});
}

function openPanel(start){
  if(flippedCount === 0) return;
  const sp = SPREADS[curSp];
  const pb = document.getElementById('pb');
  pb.innerHTML='';
  // only render cards that have been flipped (index < flippedCount)
  let renderedIdx = 0;
  let scrollTarget = null;
  drawn.forEach((card,i)=>{
    if(i >= flippedCount) return;
    const d = document.createElement('div');
    d.className = 'rc' + (i===start?' hi':'');
    const tw=70, th=123;
    d.innerHTML=`<div class="rct">${faceSVG(card,tw,th)}</div>
<div style="flex:1;min-width:0">
  <div class="rcp">${sp.pos[i].l}</div>
  <div class="rcn">${card.type==='major'?card.name+' · '+card.eng:card.name}</div>
  ${card._rv?'<div class="rcr">✦ 逆位 Reversed</div>':''}
  <div class="rcm">
    ${card._rv
      ? `<span style="color:var(--or);font-family:'Noto Serif SC',serif;font-size:11px;letter-spacing:.1em">✦ 逆位</span><br>${card.r}<br><br><span style="color:var(--md);font-size:12px">正位含义：</span><br>${card.m}`
      : card.m
    }
  </div>
</div>`;
    pb.appendChild(d);
    if(i===start) scrollTarget = d;
    renderedIdx++;
  });
  document.getElementById('panel').classList.add('open');
  setTimeout(()=>{
    if(scrollTarget) scrollTarget.scrollIntoView({behavior:'smooth',block:'nearest'});
  },80);
}

// ── Event handlers ──
document.querySelectorAll('.tb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    curSp = b.dataset.sp;
    const sp = SPREADS[curSp];
    document.getElementById('desc').textContent = sp.desc;
    document.getElementById('cnt').textContent  = `${sp.cnt} 张牌 · ${sp.label}`;
    drawn=[];
    flippedCount=0;
    document.getElementById('panel').classList.remove('open');
    document.getElementById('dbtn').style.display = '';
    document.getElementById('fnbtn').style.display = 'none';
    render();
  });
});

document.getElementById('dbtn').addEventListener('click',()=>{
  document.getElementById('panel').classList.remove('open');
  const sp = SPREADS[curSp];
  drawn = shuffle(DECK).slice(0,sp.cnt).map(c=>({...c,_rv:Math.random()<.25}));
  flippedCount = 0;
  // hide draw btn, show flip-next btn
  document.getElementById('dbtn').style.display = 'none';
  render();
});

document.getElementById('xbtn').addEventListener('click',()=>{
  drawn=[];
  flippedCount=0;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('card-preview').classList.remove('show');
  document.getElementById('dbtn').style.display = '';
  document.getElementById('fnbtn').style.display = 'none';
  document.getElementById('desc').textContent = SPREADS[curSp].desc;
  render();
});

document.getElementById('rbtn').addEventListener('click',()=>{ if(drawn.length) openPanel(0); });
// Prevent panel touch events from bubbling to canvas touchstart/touchend
document.getElementById('panel').addEventListener('touchstart', e=>e.stopPropagation(), {passive:true});
document.getElementById('panel').addEventListener('touchend', e=>e.stopPropagation(), {passive:false});

document.getElementById('clo').addEventListener('click',()=>{
  document.getElementById('panel').classList.remove('open');
});

// ── Resize: re-render if cards visible ──
new ResizeObserver(()=>{ if(drawn.length) render(); })
  .observe(document.getElementById('stage'));

// ── Init ──
const sp0 = SPREADS[curSp];
document.getElementById('desc').textContent = sp0.desc;
document.getElementById('cnt').textContent  = `${sp0.cnt} 张牌 · ${sp0.label}`;
</script>
</body>
